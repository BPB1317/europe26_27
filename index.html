<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Matrice Confrontations Europe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e0e0e0; padding: 20px; }
  h1 { font-size: 1.2rem; margin-bottom: 6px; color: #fff; }
  .subtitle { font-size: 0.8rem; color: #666; margin-bottom: 16px; }
  .legend { display:flex; gap:16px; align-items:center; margin-bottom:14px; font-size:11px; color:#888; }
  .legend-bar { display:flex; gap:2px; align-items:center; }
  .legend-sq { width:14px; height:14px; border-radius:2px; }

  .wrapper { overflow: auto; max-height: 85vh; }
  table { border-collapse: collapse; font-size: 11px; }
  th, td { border: 1px solid #1e1e2e; padding: 0; }

  th.corner { min-width: 110px; background:#0f1117; position:sticky; top:0; left:0; z-index:3; }
  th.col-head {
    position: sticky; top: 0; z-index: 2;
    background: #13131f;
    padding: 8px 4px 6px;
    white-space: nowrap; cursor: default; min-width: 36px;
  }
  .col-inner {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    writing-mode: vertical-rl; transform: rotate(180deg);
  }
  .col-inner img { transform: rotate(180deg); }
  .col-inner .ccode { font-size: 10px; font-weight: 600; color: #bbb; }

  th.row-head {
    position: sticky; left: 0; z-index: 1;
    padding: 3px 8px; white-space: nowrap; text-align: left;
    background: #13131f; font-weight: 500; color: #ccc;
    min-width: 110px; border-right: 2px solid #2a2a3a;
  }
  .row-inner { display:flex; align-items:center; gap:6px; }
  .row-inner img { flex-shrink:0; }
  .row-inner .rname { font-size:11px; }

  td.cell { width: 36px; height: 28px; text-align: center; cursor: pointer;
    transition: filter .12s; font-size: 11px; font-weight: 700; }
  td.cell:hover { filter: brightness(1.5) saturate(1.3);
    outline: 2px solid #fff; z-index: 2; position: relative; }
  td.diagonal { background: #0d0d18; cursor: default; }
  td.zero { background: #0f1117; color: #222; cursor: default; font-size:13px; }

  /* Crosshair highlight */
  tr.row-hl > th.row-head { background: #252540 !important; color: #fff; }
  tr.row-hl > td { filter: brightness(1.25); }
  tr.row-hl > td.zero, tr.row-hl > td.diagonal { background: #1a1a30 !important; }
  th.col-head.col-hl { background: #252540 !important; }
  td.col-hl { filter: brightness(1.25); }
  td.col-hl.zero, td.col-hl.diagonal { background: #1a1a30 !important; }

  /* Modal */
  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; }
  #modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:#16172a; border:1px solid #2e2e50; border-radius:12px;
    padding:22px 24px; min-width:460px; max-width:640px; max-height:80vh;
    overflow-y:auto; z-index:101; box-shadow: 0 12px 48px rgba(0,0,0,.6); }
  #modal-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  #modal-header img { border-radius:2px; }
  #modal-title { font-size:1rem; font-weight:700; color:#fff; flex:1; }
  #modal-count { font-size:0.8rem; color:#666; white-space:nowrap; }
  .close { cursor:pointer; font-size:1.3rem; color:#555; margin-left:8px; line-height:1; }
  .close:hover { color:#fff; }

  table.matches { width:100%; border-collapse:collapse; font-size:12px; }
  table.matches th { background:#1e1f35; padding:6px 10px; text-align:left;
    color:#888; font-weight:500; font-size:11px; border-bottom:1px solid #2a2a3a; }
  table.matches td { padding:6px 10px; border-top:1px solid #1a1a28; vertical-align:middle; }
  table.matches tr:hover td { background:#1c1d30; }
  .team-cell { display:flex; align-items:center; gap:5px; }
  .team-cell img { border-radius:1px; flex-shrink:0; }
  .comp-badge { display:inline-block; padding:2px 6px; border-radius:4px;
    font-size:10px; font-weight:700; letter-spacing:.3px; }
  .UCL  { background:#1a3a6a; color:#6ab0ff; }
  .UEL  { background:#4a2a0a; color:#ffaa44; }
  .UECL { background:#1a4a2a; color:#44cc88; }

  /* Country search */
  .search-bar { display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .search-bar select { background:#16172a; color:#e0e0e0; border:1px solid #2e2e50;
    border-radius:6px; padding:6px 10px; font-size:12px; cursor:pointer; min-width:170px; }
  .search-bar select:focus { outline:none; border-color:#4a6fa5; }
  .search-bar button { background:#1a3a6a; color:#6ab0ff; border:1px solid #2a5090;
    border-radius:6px; padding:6px 14px; font-size:12px; cursor:pointer; font-weight:600; }
  .search-bar button:hover { background:#2a5090; }
  td.cell.flash { outline:3px solid #fff !important; filter:brightness(2.2) saturate(1.5) !important;
    z-index:4; position:relative; }
</style>
</head>
<body>
<h1>Matrice des confrontations — Compétitions européennes</h1>
<p class="subtitle">UCL · UEL · UECL — 2023 à 2025 — cliquer sur une cellule pour voir les matchs</p>
<div class="legend">
  <span>Intensité :</span>
  <div class="legend-bar">
    <div class="legend-sq" style="background:#14283c"></div>
    <div class="legend-sq" style="background:#1a4060"></div>
    <div class="legend-sq" style="background:#1e6090"></div>
    <div class="legend-sq" style="background:#2090c0"></div>
    <div class="legend-sq" style="background:#30c0e0"></div>
  </div>
  <span>peu → beaucoup de matchs</span>
  <span style="margin-left:8px">· = 0 match</span>
</div>
<div class="search-bar">
  <select id="sel1"><option value="">Pays 1…</option></select>
  <span style="color:#555;font-size:1rem">vs</span>
  <select id="sel2"><option value="">Pays 2…</option></select>
  <button onclick="searchMatch()">Voir les rencontres</button>
</div>
<div class="wrapper">
<table id="matrix-table"></table>
</div>
<div id="overlay" onclick="closeModal()"></div>
<div id="modal">
  <div id="modal-header">
    <div id="modal-flags" style="display:flex;gap:6px;align-items:center;"></div>
    <div id="modal-title"></div>
    <div id="modal-count"></div>
    <span class="close" onclick="closeModal()">&#x2715;</span>
  </div>
  <table class="matches">
    <thead id="modal-head"><tr><th>Date</th><th>Domicile</th><th>Extérieur</th><th>Score</th><th></th></tr></thead>
    <tbody id="modal-body"></tbody>
  </table>
</div>

function flag(code, h=16) {
  const src = DATA.flags_b64[code];
  if (!src) return '';
  return `<img src="${src}" height="${h}" style="vertical-align:middle;border-radius:1px" title="${DATA.names[code]||code}">`;
}

function colorForCount(n, max) {
  if (n === 0) return null;
  const t = Math.pow(n / max, 0.55);
  const r = Math.round(14  + t * (30  - 14));
  const g = Math.round(30  + t * (200 - 30));
  const b = Math.round(50  + t * (230 - 50));
  return `rgb(${r},${g},${b})`;
}

  const max = Math.max(...allVals);
  const tbl = document.getElementById('matrix-table');

  let html = '<thead><tr><th class="corner"></th>';
  countries.forEach((c, ci) => {
    html += `<th class="col-head" data-col="${ci}" title="${names[c]||c}">
      <div class="col-inner">${flag(c,13)}
        <span class="ccode">${c}</span>
      </div></th>`;
  });
  html += '</tr></thead><tbody>';

  countries.forEach((row, ri) => {
    html += `<tr><th class="row-head">
      <div class="row-inner">
        ${flag(row,14)}
        <span class="rname">${names[row]||row}</span>
      </div></th>`;
    countries.forEach((col, ci) => {
      if (row === col) {
        html += `<td class="cell diagonal" data-col="${ci}"></td>`;
      } else {
        const n = matrix[row][col] || 0;
        if (n === 0) {
          html += `<td class="cell zero" data-col="${ci}">·</td>`;
        } else {
          const bg = colorForCount(n, max);
          html += `<td class="cell" data-col="${ci}" style="background:${bg};color:#fff"
            onclick="showMatches('${row}','${col}')">${n}</td>`;
        }
      }
    });
    html += '</tr>';
  });
  html += '</tbody>';
  tbl.innerHTML = html;

  // Crosshair highlight
  document.querySelectorAll('td.cell').forEach(cell => {
    cell.addEventListener('mouseenter', () => {
      const ci = cell.dataset.col;
      cell.closest('tr').classList.add('row-hl');
      document.querySelectorAll(`[data-col="${ci}"]`).forEach(el => el.classList.add('col-hl'));
    });
    cell.addEventListener('mouseleave', () => {
      document.querySelectorAll('.row-hl').forEach(el => el.classList.remove('row-hl'));
      document.querySelectorAll('.col-hl').forEach(el => el.classList.remove('col-hl'));
    });
  });
}

function opponentsOf(c) {
  return Object.keys(DATA.matches)
    .filter(k => k.startsWith(c+'__') || k.endsWith('__'+c))
    .map(k => k.startsWith(c+'__') ? k.slice(c.length+2) : k.slice(0, k.indexOf('__')));
}

function pairKey(a, b) { return a < b ? `${a}__${b}` : `${b}__${a}`; }

function showMatches(c1, c2) {
  const { matches, names } = DATA;
  const key = pairKey(c1, c2);
  const list = matches[key] || [];

  document.getElementById('modal-flags').innerHTML =
    `${flag(c1,20)} <span style="color:#555;font-size:1.1rem">vs</span> ${flag(c2,20)}`;
  document.getElementById('modal-title').textContent =
    `${names[c1]||c1}  vs  ${names[c2]||c2}`;

  const tbody = document.getElementById('modal-body');
  const thead = document.getElementById('modal-head');

  if (list.length > 0) {
    document.getElementById('modal-count').textContent =
      `${list.length} match${list.length>1?'s':''}`;
    thead.innerHTML = '<tr><th>Date</th><th>Domicile</th><th>Extérieur</th><th>Score</th><th></th></tr>';
    tbody.innerHTML = list.map(m => `
      <tr>
        <td style="color:#888;white-space:nowrap">${m.date}</td>
        <td><div class="team-cell">${flag(m.hc,13)}<span>${m.home}</span></div></td>
        <td><div class="team-cell">${flag(m.ac,13)}<span>${m.away}</span></div></td>
        <td><b style="white-space:nowrap">${m.result}</b></td>
        <td><span class="comp-badge ${m.comp}">${m.comp}</span></td>
      </tr>`).join('');
  } else {
    // Common opponents mode
    const opp1 = new Set(opponentsOf(c1));
    const opp2 = new Set(opponentsOf(c2));
    const common = [...opp1].filter(c => opp2.has(c));
    common.sort((a, b) => {
      const na = (matches[pairKey(a,c1)]||[]).length + (matches[pairKey(a,c2)]||[]).length;
      const nb = (matches[pairKey(b,c1)]||[]).length + (matches[pairKey(b,c2)]||[]).length;
      return nb - na;
    });
    document.getElementById('modal-count').textContent =
      `0 match direct · ${common.length} adversaire${common.length!==1?'s':''} commun${common.length!==1?'s':''}`;
    thead.innerHTML = `<tr>
      <th>Adversaire commun</th>
      <th>${flag(c1,12)} ${names[c1]||c1}</th>
      <th>${flag(c2,12)} ${names[c2]||c2}</th>
    </tr>`;
    const fmtMatches = (ms) => ms.length === 0 ? '<span style="color:#444">—</span>' :
      ms.map(m => `<span style="white-space:nowrap;font-size:11px;color:#bbb">${m.date.slice(0,7)} <b>${m.result}</b></span>`).join('<br>');
    tbody.innerHTML = common.length === 0
      ? `<tr><td colspan="3" style="color:#555;padding:16px;text-align:center">Aucun adversaire commun</td></tr>`
      : common.map(c => `
        <tr>
          <td><div class="team-cell">${flag(c,14)}<span>${names[c]||c}</span></div></td>
          <td>${fmtMatches(matches[pairKey(c,c1)]||[])}</td>
          <td>${fmtMatches(matches[pairKey(c,c2)]||[])}</td>
        </tr>`).join('');
  }

  document.getElementById('overlay').style.display = 'block';
  document.getElementById('modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('modal').style.display = 'none';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function initSelects() {
  const { countries, names } = DATA;
  ['sel1','sel2'].forEach(id => {
    const sel = document.getElementById(id);
    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = `${names[c]||c}`;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      const c1 = document.getElementById('sel1').value;
      const c2 = document.getElementById('sel2').value;
      if (c1 && c2 && c1 !== c2) searchMatch();
    });
  });
}

function searchMatch() {
  const c1 = document.getElementById('sel1').value;
  const c2 = document.getElementById('sel2').value;
  if (!c1 || !c2 || c1 === c2) return;
  showMatches(c1, c2);
  const ri = DATA.countries.indexOf(c1);
  const ci = DATA.countries.indexOf(c2);
  const tbody = document.querySelector('#matrix-table tbody');
  if (tbody && tbody.rows[ri]) {
    const cell = tbody.rows[ri].querySelector(`[data-col="${ci}"]`);
    if (cell) {
      cell.scrollIntoView({ behavior:'smooth', block:'center', inline:'center' });
      cell.classList.add('flash');
      setTimeout(() => cell.classList.remove('flash'), 1500);
    }
  }
}

buildMatrix();
initSelects();
</script>
